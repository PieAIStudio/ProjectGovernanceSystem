# lefthook.yml - Project Governance System central doc-gov gate.
# Install locally with:
#   pnpm exec lefthook install

pre-commit:
  parallel: false
  commands:
    01-doc-gov-router-check:
      glob: "{AGENTS.md,CLAUDE.md,GEMINI.md,README.md,docs/**/*.{md,yml,yaml},starter/**/*.{md,yml,yaml},integrations/**/*.md,profiles/**/*.{md,yml,yaml},packages/doc-gov/src/**/*.ts}"
      run: pnpm doc-gov router-check
    02-doc-gov-check:
      glob: "{docs/**/*.md,docs/governance/**/*.{md,yml,yaml},docs/policy/**/*.md,AGENTS.md,CLAUDE.md,GEMINI.md,README.md,packages/doc-gov/src/**/*.ts}"
      run: pnpm doc-gov check && pnpm doc-gov scan --check && pnpm doc-gov links && pnpm doc-gov audit

commit-msg:
  commands:
    doc-gov-commit-msg:
      run: pnpm doc-gov verify-commit-msg "{1}"
