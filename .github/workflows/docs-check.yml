name: docs-check

on:
  pull_request:
    paths:
      - "AGENTS.md"
      - "README.md"
      - "CHANGELOG.md"
      - "docs/**"
      - "starter/**"
      - "profiles/**"
      - "integrations/**"
      - "packages/doc-gov/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/docs-check.yml"
      - ".github/workflows/npm-publish.yml"
  push:
    branches:
      - main
    paths:
      - "AGENTS.md"
      - "README.md"
      - "CHANGELOG.md"
      - "docs/**"
      - "starter/**"
      - "profiles/**"
      - "integrations/**"
      - "packages/doc-gov/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/docs-check.yml"
      - ".github/workflows/npm-publish.yml"

jobs:
  doc-gov:
    name: doc-gov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Git hooks
        run: pnpm exec lefthook install

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Test packed consumer install
        run: pnpm test:package-consumer

      - name: Validate router and entry files
        run: pnpm doc-gov router-check

      - name: Validate governed docs
        run: pnpm doc-gov check

      - name: Validate manifest freshness
        run: pnpm doc-gov scan --check

      - name: Validate links
        run: pnpm doc-gov links

      - name: Audit docs
        run: pnpm doc-gov audit

      - name: Doctor
        run: pnpm doc-gov doctor
