name: npm-publish

on:
  workflow_dispatch:

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Guard main branch
        run: |
          if [ "$GITHUB_REF_NAME" != "main" ]; then
            echo "npm publishing is only allowed from main, got: $GITHUB_REF_NAME" >&2
            exit 1
          fi

      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Ensure npm supports Trusted Publishing
        run: |
          npm install -g npm@latest
          npm --version

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm test:package-consumer
      - run: pnpm doc-gov router-check
      - run: pnpm doc-gov check
      - run: pnpm doc-gov scan --check
      - run: pnpm doc-gov links
      - run: pnpm doc-gov audit

      - name: Resolve release versions
        id: versions
        run: |
          DOC_VERSION=$(node -p "require('./packages/doc-gov/package.json').version")
          PRO_VERSION=$(node -p "require('./packages/pro-gov/package.json').version")

          if [ "$DOC_VERSION" != "$PRO_VERSION" ]; then
            echo "Package versions must match. doc-gov=$DOC_VERSION pro-gov=$PRO_VERSION" >&2
            exit 1
          fi

          echo "version=$DOC_VERSION" >> "$GITHUB_OUTPUT"
          echo "doc_version=$DOC_VERSION" >> "$GITHUB_OUTPUT"
          echo "pro_version=$PRO_VERSION" >> "$GITHUB_OUTPUT"

      - name: Check existing npm versions
        id: registry
        run: |
          DOC_PKG="@pieai/doc-gov@${{ steps.versions.outputs.doc_version }}"
          PRO_PKG="@pieai/pro-gov@${{ steps.versions.outputs.pro_version }}"

          if npm view "$DOC_PKG" version --registry https://registry.npmjs.org/ >/tmp/doc-gov-version 2>/dev/null; then
            echo "doc_exists=true" >> "$GITHUB_OUTPUT"
            echo "Found existing $DOC_PKG"
          else
            echo "doc_exists=false" >> "$GITHUB_OUTPUT"
            echo "$DOC_PKG is not published yet"
          fi

          if npm view "$PRO_PKG" version --registry https://registry.npmjs.org/ >/tmp/pro-gov-version 2>/dev/null; then
            echo "pro_exists=true" >> "$GITHUB_OUTPUT"
            echo "Found existing $PRO_PKG"
          else
            echo "pro_exists=false" >> "$GITHUB_OUTPUT"
            echo "$PRO_PKG is not published yet"
          fi

      - name: Publish @pieai/doc-gov
        if: steps.registry.outputs.doc_exists != 'true'
        run: |
          pnpm --filter @pieai/doc-gov pack --out "$RUNNER_TEMP/doc-gov.tgz"
          npm publish "$RUNNER_TEMP/doc-gov.tgz" --provenance --access public --registry https://registry.npmjs.org/

      - name: Verify @pieai/doc-gov
        run: |
          for attempt in {1..24}; do
            PUBLISHED=$(npm view "@pieai/doc-gov@${{ steps.versions.outputs.doc_version }}" version --registry https://registry.npmjs.org/ 2>/dev/null || true)
            if [ "$PUBLISHED" = "${{ steps.versions.outputs.doc_version }}" ]; then
              echo "@pieai/doc-gov@$PUBLISHED is visible on npm."
              exit 0
            fi
            echo "Waiting for @pieai/doc-gov@${{ steps.versions.outputs.doc_version }} to become visible on npm (attempt $attempt/24)."
            sleep 5
          done

          echo "@pieai/doc-gov@${{ steps.versions.outputs.doc_version }} did not become visible on npm in time." >&2
          exit 1

      - name: Publish @pieai/pro-gov
        if: steps.registry.outputs.pro_exists != 'true'
        run: |
          pnpm --filter @pieai/pro-gov pack --out "$RUNNER_TEMP/pro-gov.tgz"
          tar -xOf "$RUNNER_TEMP/pro-gov.tgz" package/package.json \
            | node -e "let s=''; process.stdin.on('data', d => s += d); process.stdin.on('end', () => { const pkg = JSON.parse(s); const range = pkg.dependencies?.['@pieai/doc-gov']; if (!range || range.startsWith('workspace:')) { console.error('Invalid @pieai/doc-gov dependency range in packed package:', range); process.exit(1); } console.log('Packed @pieai/doc-gov dependency:', range); });"
          npm publish "$RUNNER_TEMP/pro-gov.tgz" --provenance --access public --registry https://registry.npmjs.org/

      - name: Verify @pieai/pro-gov
        run: |
          for attempt in {1..24}; do
            PUBLISHED=$(npm view "@pieai/pro-gov@${{ steps.versions.outputs.pro_version }}" version --registry https://registry.npmjs.org/ 2>/dev/null || true)
            if [ "$PUBLISHED" = "${{ steps.versions.outputs.pro_version }}" ]; then
              echo "@pieai/pro-gov@$PUBLISHED is visible on npm."
              exit 0
            fi
            echo "Waiting for @pieai/pro-gov@${{ steps.versions.outputs.pro_version }} to become visible on npm (attempt $attempt/24)."
            sleep 5
          done

          echo "@pieai/pro-gov@${{ steps.versions.outputs.pro_version }} did not become visible on npm in time." >&2
          exit 1
